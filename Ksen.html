<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 - Kseniya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4a6fa5;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
        }

        .year-label {
            font-size: 1.3rem;
            color: #4a6fa5;
            letter-spacing: 2px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .month-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .month-name {
            background: #4a6fa5;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 8px 4px;
            color: #4a6fa5;
            font-weight: 600;
            font-size: 0.85rem;
        }

        td {
            text-align: center;
            padding: 8px 4px;
            font-size: 0.9rem;
            border-radius: 6px;
        }

        .weekend {
            color: #e74c3c;
            background-color: #FFF9F0;
        }

        .other-month {
            color: #ccc;
        }

        /* Пакеты */
        .p1 { background-color: rgba(144, 238, 144, 0.4); font-weight: 600; }
        .p2 { background-color: rgba(173, 216, 230, 0.5); font-weight: 600; }
        .p3 { background-color: rgba(255, 218, 185, 0.6); font-weight: 600; }
        .p4 { background-color: rgba(64, 224, 208, 0.4); font-weight: 600; }
        .p5 { background-color: rgba(255, 182, 193, 0.5); font-weight: 600; }

        .lesson {
            border: 2px solid #1e6bb8;
            font-weight: bold;
        }

        .both1 { background-color: rgba(144, 238, 144, 0.4); border: 2px solid #1e6bb8; font-weight: bold; }
        .both2 { background-color: rgba(173, 216, 230, 0.5); border: 2px solid #1e6bb8; font-weight: bold; }
        .both3 { background-color: rgba(255, 218, 185, 0.6); border: 2px solid #1e6bb8; font-weight: bold; }
        .both4 { background-color: rgba(64, 224, 208, 0.4); border: 2px solid #1e6bb8; font-weight: bold; }
        .both5 { background-color: rgba(255, 182, 193, 0.5); border: 2px solid #1e6bb8; font-weight: bold; }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .legend span { display: inline-block; width: 24px; height: 24px; border-radius: 4px; margin-right: 8px; vertical-align: middle; }
        .legend .l-weekend { background-color: #FFF9F0; border: 1px solid #e74c3c; }
        .legend .l-p1 { background-color: rgba(144, 238, 144, 0.4); border: 1px solid #90EE90; }
        .legend .l-p2 { background-color: rgba(173, 216, 230, 0.5); border: 1px solid #ADD8E6; }
        .legend .l-p3 { background-color: rgba(255, 218, 185, 0.6); border: 1px solid #FFDAB9; }
        .legend .l-p4 { background-color: rgba(64, 224, 208, 0.4); border: 1px solid #40E0D0; }
        .legend .l-p5 { background-color: rgba(255, 182, 193, 0.5); border: 1px solid #FFB6C1; }
        .legend .l-lesson { background-color: white; border: 2px solid #1e6bb8; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>2026</h1>
        <div class="year-label">Ksen's Calendar</div>
    </header>

    <div class="calendar-grid" id="calendar"></div>

    <div class="legend">
        <div><span class="l-weekend"></span> Выходные</div>
        <div><span class="l-p1"></span> Янв-Фев (пн/чт)</div>
        <div><span class="l-p2"></span> Фев-Мар (пн/чт)</div>
        <div><span class="l-p3"></span> Мар-Апр (пн/чт)</div>
        <div><span class="l-p4"></span> Апр-Май (пн/чт)</div>
        <div><span class="l-p5"></span> Май-Июн (пн/чт)</div>
        <div><span class="l-lesson"></span> Занятие Ксении</div>
    </div>
</div>

<script>
    const year = 2026;
    const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const weekDays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

    // Пакеты (20 рабочих дней)
    const pkg1 = [ // 12.01 - 06.02
        "2026-01-12","2026-01-13","2026-01-14","2026-01-15","2026-01-16",
        "2026-01-19","2026-01-20","2026-01-21","2026-01-22","2026-01-23",
        "2026-01-26","2026-01-27","2026-01-28","2026-01-29","2026-01-30",
        "2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06"
    ];
    const pkg2 = [ // 09.02 - 06.03
        "2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13",
        "2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20",
        "2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-02-27",
        "2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06"
    ];
    const pkg3 = [ // 09.03 - 03.04
        "2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13",
        "2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20",
        "2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27",
        "2026-03-30","2026-03-31","2026-04-01","2026-04-02","2026-04-03"
    ];
    const pkg4 = [ // 06.04 - 30.04
        "2026-04-06","2026-04-07","2026-04-08","2026-04-09","2026-04-10",
        "2026-04-13","2026-04-14","2026-04-15","2026-04-16","2026-04-17",
        "2026-04-20","2026-04-21","2026-04-22","2026-04-23","2026-04-24",
        "2026-04-27","2026-04-28","2026-04-29","2026-04-30"
    ];
    const pkg5 = [ // 04.05 - 29.05 (c 11 мая)
        "2026-05-04","2026-05-05","2026-05-06","2026-05-07","2026-05-08",
        "2026-05-11","2026-05-12","2026-05-13","2026-05-14","2026-05-15",
        "2026-05-18","2026-05-19","2026-05-20","2026-05-21","2026-05-22",
        "2026-05-25","2026-05-26","2026-05-27","2026-05-28","2026-05-29"
    ];

    // Занятия (пн/чт, 11 мая перенесено на 1 июня)
    const lessons = [
        "2026-01-12","2026-01-15","2026-01-19","2026-01-22","2026-01-26","2026-01-29","2026-02-02","2026-02-05",
        "2026-02-09","2026-02-12","2026-02-16","2026-02-19","2026-02-23","2026-02-26","2026-03-02","2026-03-05",
        "2026-03-09","2026-03-12","2026-03-16","2026-03-19","2026-03-23","2026-03-26","2026-03-30","2026-04-02",
        "2026-04-06","2026-04-09","2026-04-13","2026-04-16","2026-04-20","2026-04-23","2026-04-27","2026-04-30",
        "2026-05-04","2026-05-07","2026-05-14","2026-05-18","2026-05-21","2026-05-25","2026-05-28","2026-06-01"
    ];

    function getDaysInMonth(y, m) {
        return new Date(y, m + 1, 0).getDate();
    }

    function getWeekdayOffset(y, m) {
        let d = new Date(y, m, 1);
        let day = d.getDay();
        return day === 0 ? 6 : day - 1;
    }

    function formatDate(y, m, d) {
        return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = '';

        for (let month = 0; month < 12; month++) {
            const daysInMonth = getDaysInMonth(year, month);
            const startOffset = getWeekdayOffset(year, month);
            const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

            let tableHtml = `<div class="month-card"><div class="month-name">${months[month]} ${year}</div><table><thead><tr>`;
            for (let w of weekDays) {
                let isW = (w === "Сб" || w === "Вс");
                tableHtml += `<th${isW ? ' style="color:#e74c3c;"' : ''}>${w}</th>`;
            }
            tableHtml += `</thead><tbody>`;

            let day = 1;
            for (let i = 0; i < totalCells; i++) {
                if (i % 7 === 0) tableHtml += "<tr>";
                let dateStr = "";
                let isCurrentMonth = (i >= startOffset && day <= daysInMonth);
                let isWeekend = false;
                let pkgClass = "";
                let lessonClass = "";
                let finalClass = "";

                if (isCurrentMonth) {
                    dateStr = formatDate(year, month, day);
                    let wd = (i % 7);
                    isWeekend = (wd === 5 || wd === 6);

                    // Определяем пакет
                    if (pkg1.includes(dateStr)) pkgClass = "p1";
                    else if (pkg2.includes(dateStr)) pkgClass = "p2";
                    else if (pkg3.includes(dateStr)) pkgClass = "p3";
                    else if (pkg4.includes(dateStr)) pkgClass = "p4";
                    else if (pkg5.includes(dateStr)) pkgClass = "p5";

                    let isLesson = lessons.includes(dateStr);
                    if (isLesson) lessonClass = "lesson";

                    if (pkgClass && lessonClass) finalClass = `both${pkgClass.slice(1)}`;
                    else if (pkgClass) finalClass = pkgClass;
                    else if (lessonClass) finalClass = "lesson";
                }

                let cellClass = "";
                if (isCurrentMonth && isWeekend && !finalClass) cellClass = "weekend";
                else if (finalClass) cellClass = finalClass;
                else if (!isCurrentMonth) cellClass = "other-month";
                else if (isWeekend) cellClass = "weekend";

                let dayNumber = isCurrentMonth ? day : "";
                if (!isCurrentMonth) {
                    let prevMonth = month === 0 ? 11 : month - 1;
                    let prevYear = month === 0 ? year - 1 : year;
                    let daysInPrev = getDaysInMonth(prevYear, prevMonth);
                    let prevDay = daysInPrev - (startOffset - i - 1);
                    dayNumber = prevDay;
                }

                tableHtml += `<td class="${cellClass}">${dayNumber}</td>`;
                if (i % 7 === 6) tableHtml += "<tr>";
                if (isCurrentMonth) day++;
            }
            tableHtml += `</tbody></table></div>`;
            container.innerHTML += tableHtml;
        }
    }

    renderCalendar();
</script>
</body>
</html>
