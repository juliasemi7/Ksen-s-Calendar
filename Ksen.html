<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kseniya · Календарь 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }
        body {
            background: #ecf0f3;
            padding: 30px 20px;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #1e4663;
        }
        .header p {
            color: #2c5a7a;
            font-size: 1.2rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }
        .month-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s;
        }
        .month-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
        }
        .month-name {
            background: #2c5a7a;
            color: white;
            text-align: center;
            font-size: 1.45rem;
            font-weight: 600;
            padding: 14px 0;
        }
        .calendar {
            width: 100%;
            border-collapse: collapse;
        }
        .calendar th {
            padding: 12px 4px;
            font-weight: 600;
            color: #1e4a6e;
            font-size: 0.85rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .calendar td {
            text-align: center;
            padding: 10px 5px;
            font-size: 0.9rem;
            border-radius: 20px;
        }
        .other-month {
            color: #bcbcbc;
        }
        .weekend {
            background-color: #fff5ef;
            color: #c7362b;
            font-weight: 500;
        }
        /* пакеты */
        .pkg1 { background-color: #d9f0d9; font-weight: 600; } 
        .pkg2 { background-color: #cae9ff; font-weight: 600; } 
        .pkg3 { background-color: #ffe0cc; font-weight: 600; } 
        .pkg4 { background-color: #c0f0ee; font-weight: 600; } 
        .pkg5 { background-color: #ffe0f0; font-weight: 600; } 
        /* занятие */
        .lesson {
            border: 2px solid #1e6bb8;
            font-weight: 700;
        }
        .both1 { background-color: #d9f0d9; border: 2px solid #1e6bb8; font-weight: 700; }
        .both2 { background-color: #cae9ff; border: 2px solid #1e6bb8; font-weight: 700; }
        .both3 { background-color: #ffe0cc; border: 2px solid #1e6bb8; font-weight: 700; }
        .both4 { background-color: #c0f0ee; border: 2px solid #1e6bb8; font-weight: 700; }
        .both5 { background-color: #ffe0f0; border: 2px solid #1e6bb8; font-weight: 700; }

        .legend {
            background: white;
            border-radius: 60px;
            padding: 18px 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 28px;
            margin-top: 40px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
        }
        .legend span {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 10px;
            vertical-align: middle;
            margin-right: 8px;
        }
        .l-week { background: #fff5ef; border: 1px solid #c7362b; }
        .l-p1 { background: #d9f0d9; border: 1px solid #7fa55a; }
        .l-p2 { background: #cae9ff; border: 1px solid #5b90b0; }
        .l-p3 { background: #ffe0cc; border: 1px solid #d49351; }
        .l-p4 { background: #c0f0ee; border: 1px solid #40938f; }
        .l-p5 { background: #ffe0f0; border: 1px solid #c0708a; }
        .l-lesson { background: white; border: 2px solid #1e6bb8; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>2026</h1>
        <p>Ksen's Calendar · пакеты 20 дней + занятия (пн / чт)</p>
    </div>
    <div class="calendar-grid" id="calendar"></div>
    <div class="legend">
        <div><span class="l-week"></span> Выходные</div>
        <div><span class="l-p1"></span> Пакет 12.01 – 06.02</div>
        <div><span class="l-p2"></span> Пакет 09.02 – 06.03</div>
        <div><span class="l-p3"></span> Пакет 09.03 – 03.04</div>
        <div><span class="l-p4"></span> Пакет 06.04 – 30.04</div>
        <div><span class="l-p5"></span> Пакет 04.05 – 01.06</div>
        <div><span class="l-lesson"></span> Занятие Ксении</div>
    </div>
</div>

<script>
    (function() {
        const YEAR = 2026;
        const MONTH_NAMES = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
        const WEEKDAYS = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

        // ---------- ПАКЕТЫ (20 раб. дней) ----------
        const pkgJan = [ /* 12.01 – 06.02 */
            "2026-01-12","2026-01-13","2026-01-14","2026-01-15","2026-01-16",
            "2026-01-19","2026-01-20","2026-01-21","2026-01-22","2026-01-23",
            "2026-01-26","2026-01-27","2026-01-28","2026-01-29","2026-01-30",
            "2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06"
        ];
        const pkgFeb = [ /* 09.02 – 06.03 */
            "2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13",
            "2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20",
            "2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-02-27",
            "2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06"
        ];
        const pkgMar = [ /* 09.03 – 03.04 */
            "2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13",
            "2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20",
            "2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27",
            "2026-03-30","2026-03-31","2026-04-01","2026-04-02","2026-04-03"
        ];
        const pkgApr = [ /* 06.04 – 30.04 */
            "2026-04-06","2026-04-07","2026-04-08","2026-04-09","2026-04-10",
            "2026-04-13","2026-04-14","2026-04-15","2026-04-16","2026-04-17",
            "2026-04-20","2026-04-21","2026-04-22","2026-04-23","2026-04-24",
            "2026-04-27","2026-04-28","2026-04-29","2026-04-30"
        ];
        const pkgMay = [ /* 04.05 – 01.06 (включая 1 июня) */
            "2026-05-04","2026-05-05","2026-05-06","2026-05-07","2026-05-08",
            "2026-05-11","2026-05-12","2026-05-13","2026-05-14","2026-05-15",
            "2026-05-18","2026-05-19","2026-05-20","2026-05-21","2026-05-22",
            "2026-05-25","2026-05-26","2026-05-27","2026-05-28","2026-05-29",
            "2026-06-01"
        ];

        // ---------- ЗАНЯТИЯ (понедельник + четверг) ----------
        // 11 мая перенесено на 1 июня
        const lessons = [
            "2026-01-12","2026-01-15","2026-01-19","2026-01-22","2026-01-26","2026-01-29","2026-02-02","2026-02-05",
            "2026-02-09","2026-02-12","2026-02-16","2026-02-19","2026-02-23","2026-02-26","2026-03-02","2026-03-05",
            "2026-03-09","2026-03-12","2026-03-16","2026-03-19","2026-03-23","2026-03-26","2026-03-30","2026-04-02",
            "2026-04-06","2026-04-09","2026-04-13","2026-04-16","2026-04-20","2026-04-23","2026-04-27","2026-04-30",
            "2026-05-04","2026-05-07","2026-05-14","2026-05-18","2026-05-21","2026-05-25","2026-05-28","2026-06-01"
        ];

        function getDaysInMonth(y, m) {
            return new Date(y, m + 1, 0).getDate();
        }
        // индекс первого дня недели (пн=0)
        function getStartOffset(y, m) {
            const firstDay = new Date(y, m, 1);
            const dow = firstDay.getDay(); // 0 вс … 6 сб
            return dow === 0 ? 6 : dow - 1;
        }

        function getClass(dateStr, y, m, d) {
            const isWeekend = (new Date(y, m, d).getDay() === 0 || new Date(y, m, d).getDay() === 6);
            const inP1 = pkgJan.includes(dateStr);
            const inP2 = pkgFeb.includes(dateStr);
            const inP3 = pkgMar.includes(dateStr);
            const inP4 = pkgApr.includes(dateStr);
            const inP5 = pkgMay.includes(dateStr);
            const isLesson = lessons.includes(dateStr);

            if (inP1 && isLesson) return "both1";
            if (inP2 && isLesson) return "both2";
            if (inP3 && isLesson) return "both3";
            if (inP4 && isLesson) return "both4";
            if (inP5 && isLesson) return "both5";

            if (inP1) return "pkg1";
            if (inP2) return "pkg2";
            if (inP3) return "pkg3";
            if (inP4) return "pkg4";
            if (inP5) return "pkg5";

            if (isLesson) return "lesson";
            if (isWeekend) return "weekend";
            return "";
        }

        function buildCalendar() {
            const container = document.getElementById("calendar");
            container.innerHTML = "";

            for (let month = 0; month < 12; month++) {
                const daysInMonth = getDaysInMonth(YEAR, month);
                const startOffset = getStartOffset(YEAR, month);
                const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

                let tableHtml = `<div class="month-card"><div class="month-name">${MONTH_NAMES[month]} ${YEAR}</div>
                                <table class="calendar"><thead></td>`;
                for (let w of WEEKDAYS) {
                    tableHtml += `<th>${w}</th>`;
                }
                tableHtml += `</thead><tbody>`;

                let dayNum = 1;
                for (let cell = 0; cell < totalCells; cell++) {
                    if (cell % 7 === 0) tableHtml += "<tr>";

                    if (cell >= startOffset && dayNum <= daysInMonth) {
                        const fullDate = `${YEAR}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                        let cls = getClass(fullDate, YEAR, month, dayNum);
                        tableHtml += `<td class="${cls}">${dayNum}</td>`;
                        dayNum++;
                    } else {
                        // дни соседнего месяца
                        let prevMonth = month === 0 ? 11 : month-1;
                        let prevYear = month === 0 ? YEAR-1 : YEAR;
                        let daysPrev = getDaysInMonth(prevYear, prevMonth);
                        let prevDay = daysPrev - (startOffset - cell - 1);
                        tableHtml += `<td class="other-month">${prevDay}</td>`;
                    }

                    if (cell % 7 === 6) tableHtml += "</tr>";
                }
                tableHtml += `</tbody></table></div>`;
                container.innerHTML += tableHtml;
            }
        }

        buildCalendar();
    })();
</script>
</body>
</html>
